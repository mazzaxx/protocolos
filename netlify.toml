[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_BASE_URL = "https://sistema-protocolos-juridicos-production.up.railway.app/"

[context.deploy-preview.environment]
  VITE_API_BASE_URL = "https://sistema-protocolos-juridicos-production.up.railway.app/"